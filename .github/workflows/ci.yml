name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    name: Build & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Verify Formatting (Prettier)
        run: npx prettier --check .

      - name: Run Linter (ESLint)
        run: npm run lint

      - name: Type Check (TypeScript)
        run: npm run typecheck

      - name: Verify Drizzle Schema
        # Ensures no pending migrations are uncommitted
        run: npx drizzle-kit generate

      - name: Build Project
        # Uses standalone output to verify Next.js build succeeds
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: 1
          NEXT_TELEMETRY_DISABLED: 1
